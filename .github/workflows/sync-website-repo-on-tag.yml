name: Sync Website Repo On Tag

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync-website:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Enforce docs+website audit artifact for tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          AUDIT_FILE="docs/user-guide/release-audits/${TAG}.md"
          test -f "${AUDIT_FILE}"
          grep -q "^Docs Reviewed: yes$" "${AUDIT_FILE}"
          grep -q "^Website Updated: yes$" "${AUDIT_FILE}"

      - name: Checkout website repo
        uses: actions/checkout@v4
        with:
          repository: Raccoon-King/grabby-website
          token: ${{ secrets.WEBSITE_REPO_TOKEN }}
          path: website-repo
          ref: main

      - name: Sync website files
        run: |
          set -euo pipefail
          mkdir -p website-repo/public/assets/grabby

          cp docs/user-guide/index.html website-repo/public/index.html
          cp docs/user-guide/technical-portal.html website-repo/public/technical-portal.html
          cp docs/user-guide/DOCUMENT_MAP.md website-repo/public/DOCUMENT_MAP.md
          cp docs/assets/grabby/grabby_vscode.png website-repo/public/assets/grabby/grabby_vscode.png

      - name: Commit and push website updates
        run: |
          set -euo pipefail
          cd website-repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add public/index.html public/technical-portal.html public/DOCUMENT_MAP.md public/assets/grabby/grabby_vscode.png

          if git diff --cached --quiet; then
            echo "No website file changes to commit."
          else
            git commit -m "chore(sync): website update from ${GITHUB_REPOSITORY}@${GITHUB_SHA}"
            git push origin main
          fi

      - name: Mirror release tag to website repo
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -euo pipefail
          cd website-repo
          TAG="${GITHUB_REF_NAME}"
          git tag -f "${TAG}"
          git push origin "refs/tags/${TAG}" --force
