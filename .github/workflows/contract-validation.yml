# Grabby Contract Validation
# Auto-generated by: grabby cicd

name: Contract Validation

on:
  pull_request:
    paths:
      - 'contracts/**'
      - '.grabby/**'
  push:
    branches: [main, master]
    paths:
      - 'contracts/**'

jobs:
  validate-contracts:
    name: Validate Contracts
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate all contracts
        run: |
          echo "Validating contracts..."
          for contract in contracts/*.fc.md; do
            if [ -f "$contract" ]; then
              echo "Checking: $contract"
              node bin/index.cjs validate "$contract"
            fi
          done

      - name: Check for unapproved contracts
        run: |
          unapproved=$(grep -l "Status.*draft" contracts/*.fc.md 2>/dev/null || true)
          if [ -n "$unapproved" ]; then
            echo "::warning::Found draft contracts: $unapproved"
          fi

      - name: Generate metrics
        run: node bin/index.cjs metrics > contract-metrics.json
        continue-on-error: true

      - name: Upload metrics artifact
        uses: actions/upload-artifact@v7
        with:
          name: contract-metrics
          path: contract-metrics.json
          retention-days: 30
        if: always()
