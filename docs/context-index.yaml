# Central source of truth for contract version pins.
versions:
  latest:
    ARCH_VERSION: v3
    RULESET_VERSION: v2
    ENV_VERSION: v1

  # Any pin listed here is treated as an error by version compatibility checks.
  deprecated:
    ARCH_VERSION:
      - v1
    RULESET_VERSION:
      - v1
    ENV_VERSION: []

# Context ref keys used in contracts under "## Context Refs".
references:
  ARCH:
    auth-module@v3:
      file: ARCHITECTURE_INDEX.md
      section: Module Map
      status: active
      phases:
        - plan
        - execute

    stack@v2:
      file: ARCHITECTURE_INDEX.md
      section: Stack
      status: active
      phases:
        - plan

  RULESET:
    imports@v2:
      file: RULESET_CORE.md
      section: §typescript
      status: active
      phases:
        - plan
        - execute

    testing@v2:
      file: RULESET_CORE.md
      section: §testing
      status: active
      phases:
        - execute

  ENV:
    test-runner@v1:
      file: ENV_STACK.md
      section: Commands
      status: active
      phases:
        - plan
        - execute

# Defaults are used when a contract omits a kind.
defaults:
  ARCH: auth-module@v3
  RULESET: imports@v2
  ENV: test-runner@v1
