openapi: 3.0.0
info:
  title: Grabby REST API
  version: 1.0.0
  description: |
    Local-first REST API for Grabby contract management and rules repository integration.

    **Base URL**: http://127.0.0.1:3456

    **Authentication**: None (localhost-only, Phase 1)
  contact:
    name: Grabby Support
    url: https://github.com/your-org/grabby
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://127.0.0.1:3456
    description: Local development server

tags:
  - name: Contracts
    description: Contract CRUD operations and lifecycle management
  - name: Rules
    description: Rules repository sync and management
  - name: Agents
    description: Agent catalog and workflow management
  - name: Health
    description: System health and configuration

paths:
  /:
    get:
      summary: API information
      description: Returns basic API information and available endpoints
      responses:
        '200':
          description: API info
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                  version:
                    type: string
                  documentation:
                    type: string
                  endpoints:
                    type: object

  /v1/contracts:
    get:
      tags: [Contracts]
      summary: List all contracts
      description: Returns a list of all feature contracts in the repository
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContractsListResponse'

    post:
      tags: [Contracts]
      summary: Create new contract
      description: Creates a new feature contract from a title and objective
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, objective]
              properties:
                title:
                  type: string
                  minLength: 1
                  example: "Add user authentication"
                objective:
                  type: string
                  minLength: 1
                  example: "Implement JWT-based authentication for API endpoints"
                type:
                  type: string
                  enum: [feat, fix, refactor]
                  default: feat
      responses:
        '201':
          description: Contract created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          $ref: '#/components/responses/ConflictError'

  /v1/contracts/{id}:
    parameters:
      - $ref: '#/components/parameters/ContractId'

    get:
      tags: [Contracts]
      summary: Get contract details
      description: Returns contract details including content and optional validation results
      parameters:
        - name: validate
          in: query
          required: false
          schema:
            type: boolean
            default: false
          description: Include validation results
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFoundError'

    put:
      tags: [Contracts]
      summary: Update contract
      description: Updates contract content and/or status
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                content:
                  type: string
                  description: Full contract markdown content
                status:
                  type: string
                  enum: [draft, approved, executing, completed]
      responses:
        '200':
          description: Contract updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFoundError'

    delete:
      tags: [Contracts]
      summary: Delete contract
      description: Deletes a contract and its associated artifacts
      responses:
        '200':
          description: Contract deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /v1/contracts/{id}/validate:
    parameters:
      - $ref: '#/components/parameters/ContractId'

    post:
      tags: [Contracts]
      summary: Validate contract
      description: Runs validation checks on a contract
      responses:
        '200':
          description: Validation results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /v1/contracts/{id}/plan:
    parameters:
      - $ref: '#/components/parameters/ContractId'

    post:
      tags: [Contracts]
      summary: Generate plan
      description: Generates an implementation plan for a contract
      responses:
        '200':
          description: Plan generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /v1/rules:
    get:
      tags: [Rules]
      summary: List active rulesets
      description: Returns all configured active rulesets
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /v1/rules/sync:
    post:
      tags: [Rules]
      summary: Sync with central repository
      description: Syncs rulesets from the configured central Git repository
      responses:
        '200':
          description: Sync successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /v1/rules/status:
    get:
      tags: [Rules]
      summary: Check sync status
      description: Returns ruleset sync status and drift detection
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /v1/rules/{category}/{name}:
    parameters:
      - name: category
        in: path
        required: true
        schema:
          type: string
        example: languages
      - name: name
        in: path
        required: true
        schema:
          type: string
        example: typescript

    get:
      tags: [Rules]
      summary: Get specific ruleset
      description: Returns details and content of a specific ruleset
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /v1/agents:
    get:
      tags: [Agents]
      summary: List all agents
      description: Returns catalog of all available agents with metadata
      responses:
        '200':
          description: Agent list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentsListResponse'

  /v1/agents/{id}:
    parameters:
      - $ref: '#/components/parameters/AgentId'

    get:
      tags: [Agents]
      summary: Get agent details
      description: Returns full agent definition including menu and workflows
      responses:
        '200':
          description: Agent details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /v1/agents/{id}/workflows:
    parameters:
      - $ref: '#/components/parameters/AgentId'

    get:
      tags: [Agents]
      summary: List agent workflows
      description: Returns all workflows associated with an agent
      responses:
        '200':
          description: Workflow list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /v1/agents/all/workflows:
    get:
      tags: [Agents]
      summary: List all workflows
      description: Returns all workflows across all agents
      responses:
        '200':
          description: All workflows
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /v1/agents/route:
    post:
      tags: [Agents]
      summary: Route request to agent
      description: Analyzes a request and routes it to the appropriate agent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [request]
              properties:
                request:
                  type: string
                  description: The task/request to route
                  example: "Implement user authentication"
                context:
                  type: object
                  description: Optional routing context
      responses:
        '200':
          description: Routing decision
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoutingResponse'
        '400':
          $ref: '#/components/responses/ValidationError'

  /v1/agents/lint/all:
    get:
      tags: [Agents]
      summary: Lint all agent definitions
      description: Validates all agent YAML definitions and returns lint results
      responses:
        '200':
          description: Lint results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LintResponse'

  /v1/health:
    get:
      tags: [Health]
      summary: Health check
      description: Returns system health status and metrics
      responses:
        '200':
          description: System healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          description: System degraded or unhealthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /v1/config:
    get:
      tags: [Health]
      summary: Get configuration
      description: Returns runtime configuration (with secrets redacted)
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

    put:
      tags: [Health]
      summary: Update configuration
      description: Updates runtime configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [updates]
              properties:
                updates:
                  type: object
                  description: Configuration fields to update
      responses:
        '200':
          description: Configuration updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          $ref: '#/components/responses/ValidationError'

components:
  parameters:
    ContractId:
      name: id
      in: path
      required: true
      description: Contract ID in format PREFIX-NUMBER (e.g., FC-123, GRAB-001)
      schema:
        type: string
        pattern: '^[A-Z][A-Z0-9]*(?:-[A-Z0-9]+)*-\d+$'
      example: FC-123

    AgentId:
      name: id
      in: path
      required: true
      description: Agent key identifier (e.g., architect, dev, tester)
      schema:
        type: string
      example: architect

  schemas:
    SuccessResponse:
      type: object
      properties:
        status:
          type: string
          enum: [success]
        data:
          type: object
        metadata:
          $ref: '#/components/schemas/ResponseMetadata'

    ErrorResponse:
      type: object
      properties:
        status:
          type: string
          enum: [error]
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
        metadata:
          $ref: '#/components/schemas/ResponseMetadata'

    ContractsListResponse:
      type: object
      properties:
        status:
          type: string
          enum: [success]
        data:
          type: object
          properties:
            contracts:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                    example: FC-123
                  title:
                    type: string
                  status:
                    type: string
                    enum: [draft, approved, executing, completed]
                  type:
                    type: string
                  lastModified:
                    type: string
                    format: date-time
                  path:
                    type: string
            total:
              type: integer
        metadata:
          $ref: '#/components/schemas/ResponseMetadata'

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [success, error]
        data:
          type: object
          properties:
            status:
              type: string
              enum: [healthy, degraded]
            services:
              type: object
              properties:
                filesystem:
                  $ref: '#/components/schemas/ServiceStatus'
                git:
                  $ref: '#/components/schemas/ServiceStatus'
                rulesets:
                  $ref: '#/components/schemas/ServiceStatus'
            system:
              type: object
              properties:
                uptime:
                  type: number
                memory:
                  type: object
                platform:
                  type: string
                nodeVersion:
                  type: string
            version:
              type: string
            responseTime:
              type: number
        metadata:
          $ref: '#/components/schemas/ResponseMetadata'

    ServiceStatus:
      type: object
      properties:
        status:
          type: string
          enum: [ok, degraded, error, unavailable]
        message:
          type: string

    AgentsListResponse:
      type: object
      properties:
        status:
          type: string
          enum: [success]
        data:
          type: object
          properties:
            agents:
              type: array
              items:
                $ref: '#/components/schemas/AgentSummary'
            total:
              type: integer
        metadata:
          $ref: '#/components/schemas/ResponseMetadata'

    AgentSummary:
      type: object
      properties:
        id:
          type: string
          example: architect
        name:
          type: string
          example: Archie
        title:
          type: string
          example: Contract Architect
        mode:
          type: string
          enum: [interview, plan, execute, validate, audit]
        handoffCommand:
          type: string
          example: grabby agent architect CC
        rationale:
          type: string
        fileName:
          type: string
        menuCount:
          type: integer
        metadata:
          type: object

    RoutingResponse:
      type: object
      properties:
        status:
          type: string
          enum: [success]
        data:
          type: object
          properties:
            primary:
              type: object
              properties:
                id:
                  type: string
                name:
                  type: string
                title:
                  type: string
                mode:
                  type: string
                handoffCommand:
                  type: string
            next:
              type: object
              nullable: true
              properties:
                id:
                  type: string
                name:
                  type: string
                title:
                  type: string
            decision:
              type: string
            transitions:
              type: array
              items:
                type: object
                properties:
                  stage:
                    type: string
                  owner:
                    type: string
        metadata:
          $ref: '#/components/schemas/ResponseMetadata'

    LintResponse:
      type: object
      properties:
        status:
          type: string
          enum: [success]
        data:
          type: object
          properties:
            valid:
              type: boolean
            results:
              type: array
              items:
                type: object
                properties:
                  fileName:
                    type: string
                  valid:
                    type: boolean
                  errors:
                    type: array
                    items:
                      type: string
                  warnings:
                    type: array
                    items:
                      type: string
                  personaKey:
                    type: string
        metadata:
          $ref: '#/components/schemas/ResponseMetadata'

    ResponseMetadata:
      type: object
      required: [timestamp, version, requestId]
      properties:
        timestamp:
          type: string
          format: date-time
        version:
          type: string
          example: "3.7.0"
        requestId:
          type: string
          format: uuid

  responses:
    ValidationError:
      description: Validation error (400)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            status: error
            error:
              code: VALIDATION_ERROR
              message: Invalid request body
              details:
                errors:
                  - field: title
                    message: Must not be empty

    NotFoundError:
      description: Resource not found (404)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            status: error
            error:
              code: NOT_FOUND
              message: "Contract not found: FC-999"
              details:
                resource: Contract
                id: FC-999

    ConflictError:
      description: Conflict with existing resource (409)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            status: error
            error:
              code: CONFLICT
              message: Contract with this title already exists
              details: {}

    ServiceUnavailable:
      description: Service unavailable (503)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            status: error
            error:
              code: SERVICE_UNAVAILABLE
              message: "Service unavailable: git"
              details:
                service: git
