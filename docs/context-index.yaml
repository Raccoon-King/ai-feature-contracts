# Central source of truth for contract version pins and context reference resolution.
versions:
  latest:
    # Current architecture context contract version.
    ARCH_VERSION: v1
    # Current ruleset context contract version.
    RULESET_VERSION: v1
    # Current environment context contract version.
    ENV_VERSION: v1

  deprecated:
    # No deprecated versions are active right now.
    ARCH_VERSION: []
    # No deprecated versions are active right now.
    RULESET_VERSION: []
    # No deprecated versions are active right now.
    ENV_VERSION: []

# Context ref keys used in contracts under "## Context Refs".
references:
  ARCH:
    # Default architecture module map used for planning and execution.
    auth-module@v1:
      file: ARCHITECTURE_INDEX.md
      section: Module Map
      status: active
      phases:
        - plan
        - execute

    # Optional stack overview used during planning.
    stack@v1:
      file: ARCHITECTURE_INDEX.md
      section: Stack
      status: active
      phases:
        - plan

    # Baseline setup/onboarding workflow context.
    setup-validation@v1:
      file: ARCHITECTURE_INDEX.md
      section: Contract Management
      status: active
      phases:
        - plan
        - execute

  RULESET:
    # Default implementation rules for TypeScript execution.
    imports@v1:
      file: RULESET_CORE.md
      section: TypeScript
      status: active
      phases:
        - plan
        - execute

    # Optional testing ruleset reference for execution detail.
    testing@v1:
      file: RULESET_CORE.md
      section: Testing
      status: active
      phases:
        - execute

    # DB safety and migration governance.
    db-safety@v1:
      file: RULESET_DB_SAFETY.md
      section: Migration Safety
      status: active
      phases:
        - plan
        - execute

    api-compat@v1:
      file: RULESET_API_COMPAT.md
      section: Breaking Change Policy
      status: active
      phases:
        - plan
        - execute

    fe-deps@v1:
      file: RULESET_FE_DEPS.md
      section: Dependency Policy
      status: active
      phases:
        - plan
        - execute

    git-workflow@v1:
      file: RULESET_GIT_WORKFLOW.md
      section: Safe Defaults
      status: active
      phases:
        - plan
        - execute

    # Baseline governance rules used by setup contracts.
    baseline-governance@v1:
      file: RULESET_CORE.md
      section: Contracts
      status: active
      phases:
        - plan
        - execute

  ENV:
    # Default command/runtime environment used in both phases.
    test-runner@v1:
      file: ENV_STACK.md
      section: Commands
      status: active
      phases:
        - plan
        - execute

    checks@v1:
      file: ENV_STACK.md
      section: Checks
      status: active
      phases:
        - plan
        - execute

    git-commands@v1:
      file: ENV_STACK.md
      section: Git Commands
      status: active
      phases:
        - plan
        - execute

    # Local repository indexing and artifact path context.
    local-repo-index@v1:
      file: ENV_STACK.md
      section: Key Paths
      status: active
      phases:
        - plan
        - execute

# Defaults are used when a contract omits a kind.
defaults:
  ARCH: auth-module@v1
  RULESET: imports@v1
  ENV: test-runner@v1
