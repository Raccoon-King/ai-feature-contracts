name: Promote to Development

# Triggered by pushing to claude/setup-github-workflow-eeJlI.
# Fast-forward merges that branch into development and pushes the release tag.
# This is a one-time bootstrap workflow to work around proxy push restrictions.

on:
  push:
    branches:
      - 'claude/setup-github-workflow-eeJlI'

permissions:
  contents: write

jobs:
  promote:
    name: Promote to development + tag v2.3.0
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if already promoted
        id: check
        run: |
          git fetch origin
          # If development already has the version bump commit, skip
          if git log origin/development --oneline | grep -q "bump version to 2.3.0"; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Already promoted — skipping."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fast-forward development to this branch
        if: steps.check.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout development
          git merge --ff-only origin/claude/setup-github-workflow-eeJlI
          git push origin development
          echo "Promoted to development."

      - name: Push release tag v2.3.0
        if: steps.check.outputs.skip == 'false'
        run: |
          if git ls-remote --tags origin v2.3.0 | grep -q v2.3.0; then
            echo "Tag v2.3.0 already exists."
          else
            git tag -a v2.3.0 -m "Release v2.3.0"
            git push origin v2.3.0
            echo "Pushed tag v2.3.0."
          fi

      - name: Open PR to merge development into main
        if: steps.check.outputs.skip == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:development`,
              base: 'main',
              state: 'open',
            });
            if (prs.length > 0) {
              console.log(`PR already open: #${prs[0].number}`);
              return;
            }
            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'release: v2.3.0',
              head: 'development',
              base: 'main',
              body: `## Release v2.3.0\n\nBump type: **minor**\n\n### Changes\n- feat: Cloudflare Workers configuration (wrangler.jsonc, CF deployment support)\n- ci: development branch workflow, release automation, branch protection setup\n\n---\n_Auto-generated by promote-to-development workflow._`,
            });
            console.log(`Created PR #${pr.number}: ${pr.html_url}`);
