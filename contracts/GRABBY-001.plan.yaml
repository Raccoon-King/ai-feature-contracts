    description: interactive-workflows.cjs is 73KB with complex state - may require extensive mocking
    mitigation: Break into smaller test groups, focus on exported API first

  - id: R2
    description: E2E tests may have filesystem side effects
    mitigation: Use temp directories, clean up in afterEach

  - id: R3
    description: Some modules may have external dependencies (Jira, AI APIs)
    mitigation: Mock all external calls, test contract boundaries only

  - id: R4
    description: Coverage gaps in branch coverage (70% target vs 80% line target)
    mitigation: Prioritize conditional logic and switch statements

