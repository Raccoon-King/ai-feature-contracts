name: test-engineer
description: Verification-stage workflow for regression coverage and test readiness
agent: test-engineer

steps:
  - goal: Determine verification tier (basic, standard, high-risk) from contract risk signals
  - goal: Identify testable changes and missing verification coverage
  - goal: Generate or review test templates for scoped files
  - goal: Prepare the contract for audit with explicit tiered verification evidence

output:
  type: verification
  format: markdown
