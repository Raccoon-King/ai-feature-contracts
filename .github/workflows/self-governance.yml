name: Self Governance

on:
  push:
  pull_request:

jobs:
  grabby-self-governance:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Grabby self-governance session
        run: npm run grabby:session

      - name: Fail completed features left in active contracts
        run: |
          if [ -d contracts/active ]; then
            if grep -RIl "\*\*Status:\*\* complete\|\*\*Status:\*\* completed" contracts/active/*.fc.md 2>/dev/null; then
              echo "Completed features must be archived out of contracts/active/"
              exit 1
            fi
          fi

      - name: Fail hanging active contracts without disposition
        run: node bin/index.cjs feature:gc check
