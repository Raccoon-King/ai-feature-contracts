contract_id: FC-1774137262006
title: Separate Grabby engine from ruleset subsystem
status: approved
created_at: 2026-03-21T23:55:00Z
objective: >
  Decouple the Grabby core engine (CLI, contracts, workflows, personas) from the

  ruleset subsystem (sync, registry, builder) so they can be versioned,
  installed,

  and configured independently. The engine should run without ruleset modules
  present,

  and rulesets should load as an optional plugin.
phases:
  - id: phase-1
    name: Config Separation
    description: Make rulesets configuration optional with graceful fallback
    stories:
      - id: story-1.1
        title: Make rulesets config optional in config.cjs
        type: feature
        priority: high
        estimate: 2
        files:
          - path: lib/config.cjs
            action: MODIFY
            changes:
              - Make `rulesets` section optional in defaultConfig()
              - Add graceful fallback when rulesets config missing
              - Remove rulesets from required validation schema
              - Add `loadRulesetsConfig()` for separate config file support
        acceptance:
          - Engine starts without rulesets in config
          - loadConfig() returns valid config without rulesets section
          - Separate rulesets.config.json can be loaded if present
        tests:
          - tests/config.test.js - add tests for missing rulesets config
          - tests/config.test.js - add tests for rulesets.config.json
      - id: story-1.2
        title: Add rulesets.config.json support
        type: feature
        priority: medium
        estimate: 1
        files:
          - path: lib/config.cjs
            action: MODIFY
            changes:
              - Add loadRulesetsConfig(cwd) function
              - Check for rulesets.config.json in project root
              - Merge with main config if present
        acceptance:
          - Can load rulesets config from separate file
          - Separate file overrides embedded config
        tests:
          - tests/config.test.js - test separate config loading
  - id: phase-2
    name: Command Decoupling
    description: Remove sync check blocking from core commands
    stories:
      - id: story-2.1
        title: Make performRulesetSyncCheck advisory-only
        type: feature
        priority: high
        estimate: 3
        files:
          - path: lib/commands.cjs
            action: MODIFY
            changes:
              - Wrap contract-rulesets require in try/catch
              - Return early if module not available
              - Change blocking behavior to warning-only
              - Add config option to enable blocking (default: false)
        acceptance:
          - validate command works without rulesets module
          - plan command works without rulesets module
          - execute command works without rulesets module
          - Sync drift shows warning but doesn't block
        tests:
          - tests/commands.test.js - test commands without rulesets
          - tests/commands.test.js - test advisory sync check
      - id: story-2.2
        title: Add plugin hook points in commands.cjs
        type: feature
        priority: medium
        estimate: 2
        files:
          - path: lib/commands.cjs
            action: MODIFY
            changes:
              - Import plugin system (when available)
              - Add hook calls at key points (onValidate, onPlan, onExecute)
              - Pass context to hooks for plugin enrichment
        acceptance:
          - Hooks are called if plugin system available
          - Commands work normally if no plugins registered
        tests:
          - tests/commands.test.js - test hook invocation
  - id: phase-3
    name: Plugin System Foundation
    description: Create plugin registration and hook dispatch system
    stories:
      - id: story-3.1
        title: Create plugin registration system
        type: feature
        priority: high
        estimate: 3
        files:
          - path: lib/plugins/index.cjs
            action: CREATE
            changes:
              - Define PluginManager class
              - Implement register(plugin) method
              - Implement unregister(pluginId) method
              - Implement getPlugin(pluginId) method
              - Implement listPlugins() method
              - Auto-discover plugins in lib/plugins/ directory
        acceptance:
          - Plugins can be registered and unregistered
          - Plugin list can be queried
          - Auto-discovery works for local plugins
        tests:
          - tests/plugins/plugin-system.test.js - registration tests
      - id: story-3.2
        title: Create hook dispatcher
        type: feature
        priority: high
        estimate: 2
        files:
          - path: lib/plugins/hooks.cjs
            action: CREATE
            changes:
              - Define hook types (onInit, onCommand, onContractCreate,
                onValidate, onPlan, onExecute, onAudit)
              - Implement dispatch(hookName, context) method
              - Support sync and async hooks
              - Support hook priorities
              - Support hook cancellation
        acceptance:
          - Hooks can be dispatched to all registered handlers
          - Hook handlers receive context
          - Async hooks are awaited properly
        tests:
          - tests/plugins/plugin-system.test.js - hook dispatch tests
      - id: story-3.3
        title: Define plugin interface contract
        type: feature
        priority: medium
        estimate: 1
        files:
          - path: lib/plugins/types.cjs
            action: CREATE
            changes:
              - Define Plugin interface (id, name, version, hooks)
              - Define HookHandler interface
              - Define HookContext interface
              - Export type definitions
        acceptance:
          - Plugin interface is documented
          - Type checking works for plugins
        tests:
          - tests/plugins/plugin-system.test.js - interface tests
  - id: phase-4
    name: Module Restructure
    description: Move ruleset files to lib/rulesets/ subdirectory
    stories:
      - id: story-4.1
        title: Create lib/rulesets/ directory structure
        type: feature
        priority: high
        estimate: 1
        files:
          - path: lib/rulesets/
            action: CREATE
            changes:
              - Create lib/rulesets/ directory
              - Create lib/rulesets/common/ subdirectory
        acceptance:
          - Directory structure exists
        tests:
          - N/A (infrastructure)
      - id: story-4.2
        title: Move ruleset core modules
        type: refactor
        priority: high
        estimate: 3
        files:
          - path: lib/rules-sync.cjs
            action: MOVE
            to: lib/rulesets/sync.cjs
          - path: lib/rules-cli.cjs
            action: MOVE
            to: lib/rulesets/cli.cjs
          - path: lib/contract-rulesets.cjs
            action: MOVE
            to: lib/rulesets/contract-integration.cjs
          - path: lib/ruleset-builder.cjs
            action: MOVE
            to: lib/rulesets/builder.cjs
          - path: lib/ruleset-registry.cjs
            action: MOVE
            to: lib/rulesets/registry.cjs
          - path: lib/rules-authoring.cjs
            action: MOVE
            to: lib/rulesets/authoring.cjs
        acceptance:
          - All ruleset modules moved to new location
          - Old files removed
        tests:
          - Verify require paths work
      - id: story-4.3
        title: Move shared utility modules
        type: refactor
        priority: high
        estimate: 1
        files:
          - path: lib/manifest-parser.cjs
            action: MOVE
            to: lib/rulesets/common/manifest-parser.cjs
          - path: lib/sync-lock.cjs
            action: MOVE
            to: lib/rulesets/common/sync-lock.cjs
        acceptance:
          - Shared utils in common/ subdirectory
        tests:
          - Verify require paths work
      - id: story-4.4
        title: Update all internal imports
        type: refactor
        priority: high
        estimate: 2
        files:
          - path: lib/commands.cjs
            action: MODIFY
          - path: lib/api-routes/rules.cjs
            action: MODIFY
          - path: lib/rulesets/*.cjs
            action: MODIFY
        acceptance:
          - All imports updated to new paths
          - No broken requires
        tests:
          - npm test passes
      - id: story-4.5
        title: Create backward compatibility shims
        type: feature
        priority: medium
        estimate: 1
        files:
          - path: lib/rules-sync.cjs
            action: CREATE
            changes:
              - Re-export from lib/rulesets/sync.cjs
              - Add deprecation warning
          - path: lib/rules-cli.cjs
            action: CREATE
            changes:
              - Re-export from lib/rulesets/cli.cjs
              - Add deprecation warning
        acceptance:
          - Old import paths still work
          - Deprecation warning shown
        tests:
          - Test old require paths work
  - id: phase-5
    name: Ruleset Plugin
    description: Package rulesets as a plugin
    stories:
      - id: story-5.1
        title: Create ruleset plugin entry point
        type: feature
        priority: high
        estimate: 2
        files:
          - path: lib/rulesets/index.cjs
            action: CREATE
            changes:
              - Export all ruleset functionality
              - Define plugin manifest
              - Register with plugin system on load
        acceptance:
          - Rulesets can be imported as single module
          - Plugin registers automatically
        tests:
          - tests/rulesets/integration.test.js
      - id: story-5.2
        title: Implement ruleset plugin hooks
        type: feature
        priority: high
        estimate: 3
        files:
          - path: lib/rulesets/plugin.cjs
            action: CREATE
            changes:
              - Implement onCommand hook for sync check
              - Implement onContractCreate hook for metadata
              - Implement onValidate hook for drift check
              - Register hooks with plugin system
        acceptance:
          - Sync check runs via plugin hook
          - Contract metadata added via plugin hook
          - Validation drift check runs via plugin hook
        tests:
          - tests/rulesets/integration.test.js - plugin hook tests
  - id: phase-6
    name: Contract Metadata Cleanup
    description: Make ruleset metadata optional
    stories:
      - id: story-6.1
        title: Make contract ruleset metadata optional
        type: feature
        priority: medium
        estimate: 2
        files:
          - path: lib/rulesets/contract-integration.cjs
            action: MODIFY
            changes:
              - Check config before adding metadata
              - Support sidecar file option
              - Add config option for metadata location
        acceptance:
          - Contracts created without ruleset metadata if disabled
          - Sidecar file created if configured
        tests:
          - tests/rulesets/integration.test.js - metadata tests
      - id: story-6.2
        title: Support sidecar ruleset files
        type: feature
        priority: low
        estimate: 2
        files:
          - path: lib/rulesets/contract-integration.cjs
            action: MODIFY
            changes:
              - Create {contract-id}.rulesets.json
              - Read sidecar on contract load
              - Update sidecar on drift check
        acceptance:
          - Sidecar files created alongside contracts
          - Sidecar read when loading contract
        tests:
          - tests/rulesets/integration.test.js - sidecar tests
  - id: phase-7
    name: API Routes Update
    description: Update API routes for new module locations
    stories:
      - id: story-7.1
        title: Update rules API route imports
        type: refactor
        priority: high
        estimate: 1
        files:
          - path: lib/api-routes/rules.cjs
            action: MODIFY
            changes:
              - Update require paths to lib/rulesets/
              - Handle missing rulesets module gracefully
        acceptance:
          - API routes work with new paths
          - API returns 503 if rulesets not available
        tests:
          - tests/api/rules.test.js
  - id: phase-8
    name: Documentation & Migration
    description: Create migration guide and update docs
    stories:
      - id: story-8.1
        title: Create migration guide
        type: docs
        priority: high
        estimate: 1
        files:
          - path: docs/PLUGIN_MIGRATION.md
            action: CREATE
            changes:
              - Document new module structure
              - Explain plugin system
              - Provide upgrade steps
              - List breaking changes (if any)
        acceptance:
          - Migration steps documented
          - Breaking changes listed
        tests:
          - N/A (docs)
      - id: story-8.2
        title: Update README with plugin info
        type: docs
        priority: medium
        estimate: 1
        files:
          - path: README.md
            action: MODIFY
            changes:
              - Add plugin system section
              - Update architecture diagram
              - Document optional rulesets
        acceptance:
          - README reflects new architecture
        tests:
          - N/A (docs)
